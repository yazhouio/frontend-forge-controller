apiVersion: v1
kind: Namespace
metadata:
  name: extension-frontend-forge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-forge-controller
  namespace: extension-frontend-forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-forge-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-forge-controller
    spec:
      serviceAccountName: frontend-forge-controller
      containers:
        - name: controller
          image: ghcr.io/example/frontend-forge-controller:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
          env:
            - name: RUNNER_IMAGE
              value: spike2044/frontend-forge-runner:latest
            - name: RUNNER_SERVICE_ACCOUNT
              value: frontend-forge-runner
            - name: BUILD_SERVICE_BASE_URL
              value: http://frontend-forge.extension-frontend-forge.svc
            - name: JSBUNDLE_CONFIGMAP_NAMESPACE
              value: extension-frontend-forge
            - name: BUILD_SERVICE_TIMEOUT_SECONDS
              value: "600"
            - name: STALE_CHECK_GRACE_SECONDS
              value: "30"
            - name: RECONCILE_REQUEUE_SECONDS
              value: "5"
            - name: JOB_ACTIVE_DEADLINE_SECONDS
              value: "300"
            - name: JOB_TTL_SECONDS_AFTER_FINISHED
              value: "3600"
            - name: WEBHOOK_ENABLED
              value: "false"
            - name: WEBHOOK_BIND_ADDR
              value: 0.0.0.0:9443
            - name: WEBHOOK_CERT_PATH
              value: /tls/tls.crt
            - name: WEBHOOK_KEY_PATH
              value: /tls/tls.key
          volumeMounts:
            - name: webhook-tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: webhook-tls
          secret:
            secretName: frontend-forge-controller-webhook-tls
            optional: true
            items:
              - key: cert
                path: tls.crt
              - key: key
                path: tls.key
